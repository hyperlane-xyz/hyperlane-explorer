# Reject packages published less than 7 days ago (supply chain protection)
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@hyperlane-xyz/*'
overrides:
  tronweb>ethers: ^6.13.5
  ethers: ^5.7
  sha.js: 2.4.12
  cipher-base: 1.0.5
  elliptic: 6.6.1
  pbkdf2: 3.1.3
  form-data: 4.0.4
enablePrePostScripts: true
allowBuilds:
  '@parcel/watcher': false
  bigint-buffer: false
  bufferutil: false
  core-js: false
  esbuild: false
  keccak: false
  protobufjs: false
  secp256k1: false
  sharp: false
  tiny-secp256k1: false
  utf-8-validate: false
